[nuclear]
	# Default: 36.0
	# Range: 1.0 ~ 1000.0
	nuke_radius = 36.0
	# Default: 10.0
	# Range: 1.0 ~ 1000.0
	nuclear_reactor_explosion_base_radius = 10.0
	# Default: 0.5
	# Range: 0.001 ~ 100.0
	nuclear_reactor_explosion_multiplier = 0.5
	# Default: 80.0
	# Range: 1.0 ~ 10000.0
	nuclear_reactor_explosion_limit = 80.0
	# Default: 1000
	# Range: 1 ~ 100000
	fluid_cell_capacity = 1000
	add_all_fluid_cells = false
	#Spawn a daemon thread for explosion calc (experimental).
	nuclear_explosion_daemon_thread = false
	#Max reactor-hull cooling multiplier when every outward face is water-clad. 1.0 disables the bonus; 2.0 doubles cooling; scales linearly with water-adjacent faces.
	# Default: 2.0
	# Range: 1.0 ~ 10.0
	water_cooling_multiplier = 2.0
	#Fuse length for the placed Nuke block in ticks (20 ticks per second).
	# Default: 200
	# Range: 0 ~ 12000
	nuke_fuse_ticks = 200
	#If true, nuclear reactor meltdown uses a vanilla explosion which chunk-protection mods (FTB Chunks etc.) can cancel. If false (default), reactor meltdown bypasses claim protection so the reactor itself and surrounding terrain always suffer the consequences.
	reactor_meltdown_respects_claims = false
	#If true, the Nuke block and Nuke Arrow detonate via a vanilla explosion which chunk-protection mods (FTB Chunks etc.) can cancel; this also caps the destruction radius at vanilla's power-based falloff (much smaller than nuke_radius). If false (default), nukes carve a full spherical crater of nuke_radius blocks and ignore claim protection.
	nuke_respects_claims = false

